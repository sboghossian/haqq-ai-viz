<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haqq AI — Code Knowledge Graph</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; overflow: hidden; }
  #sigma-container { width: 100vw; height: 100vh; }

  /* Header */
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 20;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px;
    background: linear-gradient(180deg, rgba(15,23,42,0.95) 0%, rgba(15,23,42,0.7) 100%);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(99,102,241,0.2);
  }
  #header h1 { font-size: 18px; font-weight: 700; }
  #header h1 span { color: #818cf8; }
  #header .stats { font-size: 13px; color: #94a3b8; }
  #header .stats b { color: #c7d2fe; }

  /* Legend */
  #legend {
    position: fixed; bottom: 20px; left: 20px; z-index: 20;
    background: rgba(15,23,42,0.9); backdrop-filter: blur(8px);
    border: 1px solid rgba(99,102,241,0.2); border-radius: 10px;
    padding: 14px 18px; min-width: 180px;
  }
  #legend h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #64748b; margin-bottom: 10px; }
  .legend-item { display: flex; align-items: center; gap: 8px; padding: 3px 0; font-size: 13px; cursor: pointer; opacity: 1; transition: opacity 0.2s; }
  .legend-item.dimmed { opacity: 0.3; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-count { color: #64748b; margin-left: auto; font-size: 11px; }

  /* Controls */
  #controls {
    position: fixed; bottom: 20px; right: 20px; z-index: 20;
    display: flex; flex-direction: column; gap: 6px;
  }
  .ctrl-btn {
    width: 40px; height: 40px; border-radius: 8px; border: 1px solid rgba(99,102,241,0.3);
    background: rgba(15,23,42,0.9); backdrop-filter: blur(8px);
    color: #e2e8f0; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .ctrl-btn:hover { background: rgba(99,102,241,0.2); }

  /* Search */
  #search-box {
    position: fixed; top: 60px; left: 20px; z-index: 20;
  }
  #search-input {
    width: 260px; padding: 8px 12px; border-radius: 8px;
    border: 1px solid rgba(99,102,241,0.3); background: rgba(15,23,42,0.9);
    backdrop-filter: blur(8px); color: #e2e8f0; font-size: 13px; outline: none;
  }
  #search-input::placeholder { color: #475569; }
  #search-input:focus { border-color: #818cf8; }
  #search-results {
    margin-top: 4px; max-height: 300px; overflow-y: auto;
    background: rgba(15,23,42,0.95); border-radius: 8px;
    border: 1px solid rgba(99,102,241,0.2); display: none;
  }
  .search-item {
    padding: 8px 12px; cursor: pointer; font-size: 13px;
    border-bottom: 1px solid rgba(99,102,241,0.1);
    display: flex; align-items: center; gap: 8px;
  }
  .search-item:hover { background: rgba(99,102,241,0.15); }
  .search-type { font-size: 10px; padding: 1px 6px; border-radius: 4px; background: rgba(99,102,241,0.2); color: #a5b4fc; }

  /* Tooltip */
  #tooltip {
    position: fixed; z-index: 30; pointer-events: none; display: none;
    background: rgba(15,23,42,0.95); backdrop-filter: blur(8px);
    border: 1px solid rgba(99,102,241,0.3); border-radius: 8px;
    padding: 12px 16px; max-width: 350px; font-size: 13px;
  }
  #tooltip .tt-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  #tooltip .tt-type { font-size: 11px; padding: 1px 6px; border-radius: 4px; display: inline-block; margin-bottom: 6px; }
  #tooltip .tt-detail { color: #94a3b8; font-size: 12px; line-height: 1.5; }
</style>
</head>
<body>
<div id="sigma-container"></div>

<div id="header">
  <h1><span>Haqq AI</span> — Knowledge Graph</h1>
  <div class="stats">
    <b id="stat-nodes">0</b> nodes &nbsp;&middot;&nbsp;
    <b id="stat-edges">0</b> edges &nbsp;&middot;&nbsp;
    <b id="stat-clusters">0</b> clusters &nbsp;&middot;&nbsp;
    <b id="stat-flows">0</b> flows
    &nbsp;&middot;&nbsp; Powered by <a href="https://github.com/abhigyanpatwari/GitNexus" target="_blank" style="color:#818cf8;text-decoration:none;">GitNexus</a>
  </div>
</div>

<div id="search-box">
  <input id="search-input" type="text" placeholder="Search symbols..." autocomplete="off">
  <div id="search-results"></div>
</div>

<div id="legend">
  <h3>Node Types</h3>
  <div id="legend-items"></div>
</div>

<div id="controls">
  <button class="ctrl-btn" id="btn-zoom-in" title="Zoom in">+</button>
  <button class="ctrl-btn" id="btn-zoom-out" title="Zoom out">&minus;</button>
  <button class="ctrl-btn" id="btn-fit" title="Fit to screen">&#8982;</button>
  <button class="ctrl-btn" id="btn-fullscreen" title="Fullscreen">&#9974;</button>
</div>

<div id="tooltip">
  <div class="tt-name"></div>
  <div class="tt-type"></div>
  <div class="tt-detail"></div>
</div>

<script src="bundle.js"></script>
</body>
</html>
