<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haqq AI — Code Knowledge Graph</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; overflow: hidden; }
  #sigma-container { width: 100vw; height: 100vh; }

  /* Header */
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 20;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px;
    background: linear-gradient(180deg, rgba(15,23,42,0.95) 0%, rgba(15,23,42,0.7) 100%);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(99,102,241,0.2);
  }
  #header h1 { font-size: 18px; font-weight: 700; }
  #header h1 span { color: #818cf8; }
  #header .stats { font-size: 13px; color: #94a3b8; }
  #header .stats b { color: #c7d2fe; }

  /* Legend */
  #legend {
    position: fixed; bottom: 20px; left: 20px; z-index: 20;
    background: rgba(15,23,42,0.9); backdrop-filter: blur(8px);
    border: 1px solid rgba(99,102,241,0.2); border-radius: 10px;
    padding: 14px 18px; min-width: 180px;
  }
  #legend h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #64748b; margin-bottom: 10px; }
  .legend-item { display: flex; align-items: center; gap: 8px; padding: 3px 0; font-size: 13px; cursor: pointer; opacity: 1; transition: opacity 0.2s; }
  .legend-item.dimmed { opacity: 0.3; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-count { color: #64748b; margin-left: auto; font-size: 11px; }

  /* Controls */
  #controls {
    position: fixed; bottom: 20px; right: 20px; z-index: 20;
    display: flex; flex-direction: column; gap: 6px;
  }
  .ctrl-btn {
    width: 40px; height: 40px; border-radius: 8px; border: 1px solid rgba(99,102,241,0.3);
    background: rgba(15,23,42,0.9); backdrop-filter: blur(8px);
    color: #e2e8f0; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .ctrl-btn:hover { background: rgba(99,102,241,0.2); }

  /* Search */
  #search-box {
    position: fixed; top: 60px; left: 20px; z-index: 20;
  }
  #search-input {
    width: 260px; padding: 8px 12px; border-radius: 8px;
    border: 1px solid rgba(99,102,241,0.3); background: rgba(15,23,42,0.9);
    backdrop-filter: blur(8px); color: #e2e8f0; font-size: 13px; outline: none;
  }
  #search-input::placeholder { color: #475569; }
  #search-input:focus { border-color: #818cf8; }
  #search-results {
    margin-top: 4px; max-height: 300px; overflow-y: auto;
    background: rgba(15,23,42,0.95); border-radius: 8px;
    border: 1px solid rgba(99,102,241,0.2); display: none;
  }
  .search-item {
    padding: 8px 12px; cursor: pointer; font-size: 13px;
    border-bottom: 1px solid rgba(99,102,241,0.1);
    display: flex; align-items: center; gap: 8px;
  }
  .search-item:hover { background: rgba(99,102,241,0.15); }
  .search-type { font-size: 10px; padding: 1px 6px; border-radius: 4px; background: rgba(99,102,241,0.2); color: #a5b4fc; }

  /* Tooltip */
  #tooltip {
    position: fixed; z-index: 30; pointer-events: none; display: none;
    background: rgba(15,23,42,0.95); backdrop-filter: blur(8px);
    border: 1px solid rgba(99,102,241,0.3); border-radius: 8px;
    padding: 12px 16px; max-width: 350px; font-size: 13px;
  }
  #tooltip .tt-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  #tooltip .tt-type { font-size: 11px; padding: 1px 6px; border-radius: 4px; display: inline-block; margin-bottom: 6px; }
  #tooltip .tt-detail { color: #94a3b8; font-size: 12px; line-height: 1.5; }
</style>
</head>
<body>
<div id="sigma-container"></div>

<div id="header">
  <h1><span>Haqq AI</span> — Knowledge Graph</h1>
  <div class="stats">
    <b id="stat-nodes">0</b> nodes &nbsp;&middot;&nbsp;
    <b id="stat-edges">0</b> edges &nbsp;&middot;&nbsp;
    <b id="stat-clusters">0</b> clusters &nbsp;&middot;&nbsp;
    <b id="stat-flows">0</b> flows
    &nbsp;&middot;&nbsp; Powered by <a href="https://github.com/abhigyanpatwari/GitNexus" target="_blank" style="color:#818cf8;text-decoration:none;">GitNexus</a>
  </div>
</div>

<div id="search-box">
  <input id="search-input" type="text" placeholder="Search symbols..." autocomplete="off">
  <div id="search-results"></div>
</div>

<div id="legend">
  <h3>Node Types</h3>
  <div id="legend-items"></div>
</div>

<div id="controls">
  <button class="ctrl-btn" id="btn-zoom-in" title="Zoom in">+</button>
  <button class="ctrl-btn" id="btn-zoom-out" title="Zoom out">&minus;</button>
  <button class="ctrl-btn" id="btn-fit" title="Fit to screen">&#8982;</button>
  <button class="ctrl-btn" id="btn-fullscreen" title="Fullscreen">&#9974;</button>
</div>

<div id="tooltip">
  <div class="tt-name"></div>
  <div class="tt-type"></div>
  <div class="tt-detail"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/graphology/0.25.4/graphology.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sigma.js/2.4.0/sigma.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/graphology-layout-forceatlas2@0.10.1/dist/graphology-layout-forceatlas2.min.js"></script>
<script>
(async function() {

const NODE_COLORS = {
  Project: '#a855f7', Package: '#8b5cf6', Module: '#7c3aed',
  Folder: '#6366f1', File: '#3b82f6', Class: '#f59e0b',
  Function: '#10b981', Method: '#14b8a6', Interface: '#ec4899',
  Enum: '#f97316', Variable: '#64748b', Type: '#94a3b8',
  Community: '#818cf8', Process: '#f43f5e', Decorator: '#d946ef',
  Import: '#0ea5e9', CodeElement: '#6b7280', Struct: '#eab308'
};

const NODE_SIZES = {
  Project: 18, Package: 14, Module: 12, Folder: 10,
  File: 5, Class: 8, Function: 4, Method: 3,
  Interface: 7, Enum: 5, Variable: 2, Type: 2,
  Community: 0, Process: 0, Decorator: 3, Import: 2
};

const EDGE_COLORS = {
  CONTAINS: '#1e3a2a', DEFINES: '#0e5a6a', IMPORTS: '#1d3ed8',
  CALLS: '#6d2aed', EXTENDS: '#a23a0c', IMPLEMENTS: '#9e1850',
  HAS_METHOD: '#0e5a6a', MEMBER_OF: '#4a4a6a', STEP_IN_PROCESS: '#8b3a5e',
  OVERRIDES: '#a23a0c', USES: '#4a5568'
};

// Load data
const resp = await fetch('graph.json');
const data = await resp.json();
const nodes = data.nodes;
const edges = data.relationships || data.edges;

// Build graph
const graph = new graphology.Graph({ multi: true, type: 'directed' });

const hiddenTypes = new Set(['Community', 'Process']);
const visibleNodes = new Set();

nodes.forEach(n => {
  if (hiddenTypes.has(n.label)) return;
  const props = n.properties || {};
  visibleNodes.add(n.id);
  graph.addNode(n.id, {
    label: props.name || n.id,
    x: Math.random() * 1000 - 500,
    y: Math.random() * 1000 - 500,
    size: NODE_SIZES[n.label] || 3,
    color: NODE_COLORS[n.label] || '#6b7280',
    nodeType: n.label,
    filePath: props.filePath || '',
    startLine: props.startLine,
    originalColor: NODE_COLORS[n.label] || '#6b7280',
    originalSize: NODE_SIZES[n.label] || 3,
  });
});

edges.forEach(e => {
  if (visibleNodes.has(e.sourceId) && visibleNodes.has(e.targetId)) {
    try {
      graph.addEdge(e.sourceId, e.targetId, {
        color: EDGE_COLORS[e.type] || '#334155',
        size: Math.max(0.3, (e.confidence || 0.5) * 1.5),
        relationType: e.type,
        originalColor: EDGE_COLORS[e.type] || '#334155',
      });
    } catch(ex) { /* skip duplicate */ }
  }
});

// Layout: ForceAtlas2
const fa2 = graphologyLayoutForceAtlas2;
const settings = fa2.inferSettings(graph);
settings.gravity = 0.05;
settings.scalingRatio = 3;
settings.barnesHutOptimize = true;
fa2.assign(graph, { iterations: 300, settings });

// Stats
const typeCounts = {};
nodes.forEach(n => { if (!hiddenTypes.has(n.label)) typeCounts[n.label] = (typeCounts[n.label]||0)+1; });
const communityCount = nodes.filter(n => n.label === 'Community').length;
const processCount = nodes.filter(n => n.label === 'Process').length;

document.getElementById('stat-nodes').textContent = graph.order;
document.getElementById('stat-edges').textContent = graph.size;
document.getElementById('stat-clusters').textContent = communityCount;
document.getElementById('stat-flows').textContent = processCount;

// Render
const container = document.getElementById('sigma-container');
const renderer = new Sigma(graph, container, {
  renderEdgeLabels: false,
  defaultEdgeType: 'arrow',
  labelColor: { color: '#cbd5e1' },
  labelFont: 'Inter, system-ui, sans-serif',
  labelSize: 12,
  labelRenderedSizeThreshold: 6,
  defaultNodeColor: '#6b7280',
  defaultEdgeColor: '#334155',
  minCameraRatio: 0.02,
  maxCameraRatio: 20,
  nodeReducer: (node, data) => {
    const d = { ...data };
    if (highlightedNodes && highlightedNodes.size > 0) {
      if (!highlightedNodes.has(node)) {
        d.color = '#1e293b';
        d.label = '';
        d.size = d.size * 0.5;
      }
    }
    if (filteredTypes.size > 0 && filteredTypes.has(d.nodeType)) {
      d.hidden = true;
    }
    return d;
  },
  edgeReducer: (edge, data) => {
    const d = { ...data };
    if (highlightedNodes && highlightedNodes.size > 0) {
      const src = graph.source(edge);
      const tgt = graph.target(edge);
      if (!highlightedNodes.has(src) || !highlightedNodes.has(tgt)) {
        d.color = '#0f172a';
        d.hidden = true;
      }
    }
    return d;
  }
});

// Highlight state
let highlightedNodes = null;
const filteredTypes = new Set();

// Node hover tooltip
const tooltip = document.getElementById('tooltip');
renderer.on('enterNode', ({node}) => {
  const attrs = graph.getNodeAttributes(node);
  tooltip.querySelector('.tt-name').textContent = attrs.label;
  const typeEl = tooltip.querySelector('.tt-type');
  typeEl.textContent = attrs.nodeType;
  typeEl.style.background = (NODE_COLORS[attrs.nodeType] || '#6b7280') + '33';
  typeEl.style.color = NODE_COLORS[attrs.nodeType] || '#6b7280';
  let detail = '';
  if (attrs.filePath) detail += attrs.filePath;
  if (attrs.startLine) detail += ':' + attrs.startLine;
  const neighbors = graph.neighbors(node);
  detail += `\n${neighbors.length} connections`;
  tooltip.querySelector('.tt-detail').textContent = detail;
  tooltip.style.display = 'block';
  container.style.cursor = 'pointer';
});

renderer.getMouseCaptor().on('mousemovebody', (e) => {
  tooltip.style.left = (e.original.clientX + 15) + 'px';
  tooltip.style.top = (e.original.clientY + 15) + 'px';
});

renderer.on('leaveNode', () => {
  tooltip.style.display = 'none';
  container.style.cursor = 'default';
});

// Click node: highlight neighborhood
renderer.on('clickNode', ({node}) => {
  const neighbors = new Set(graph.neighbors(node));
  neighbors.add(node);
  highlightedNodes = neighbors;
  renderer.refresh();
});

renderer.on('clickStage', () => {
  highlightedNodes = null;
  renderer.refresh();
});

// Legend
const legendContainer = document.getElementById('legend-items');
const sortedTypes = Object.entries(typeCounts).sort((a,b) => b[1]-a[1]);
sortedTypes.forEach(([type, count]) => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<span class="legend-dot" style="background:${NODE_COLORS[type]||'#6b7280'}"></span>${type}<span class="legend-count">${count}</span>`;
  item.addEventListener('click', () => {
    if (filteredTypes.has(type)) { filteredTypes.delete(type); item.classList.remove('dimmed'); }
    else { filteredTypes.add(type); item.classList.add('dimmed'); }
    renderer.refresh();
  });
  legendContainer.appendChild(item);
});

// Search
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();
  searchResults.innerHTML = '';
  if (q.length < 2) { searchResults.style.display = 'none'; return; }
  const matches = [];
  graph.forEachNode((id, attrs) => {
    if (attrs.label.toLowerCase().includes(q) || (attrs.filePath||'').toLowerCase().includes(q)) {
      matches.push({id, ...attrs});
    }
  });
  matches.sort((a,b) => a.label.localeCompare(b.label));
  matches.slice(0, 20).forEach(m => {
    const div = document.createElement('div');
    div.className = 'search-item';
    div.innerHTML = `<span class="search-type">${m.nodeType}</span>${m.label}`;
    div.addEventListener('click', () => {
      const pos = renderer.getNodeDisplayData(m.id);
      const camera = renderer.getCamera();
      camera.animate({ x: pos.x, y: pos.y, ratio: 0.15 }, { duration: 400 });
      const neighbors = new Set(graph.neighbors(m.id));
      neighbors.add(m.id);
      highlightedNodes = neighbors;
      renderer.refresh();
      searchResults.style.display = 'none';
      searchInput.value = m.label;
    });
    searchResults.appendChild(div);
  });
  searchResults.style.display = matches.length ? 'block' : 'none';
});

searchInput.addEventListener('blur', () => { setTimeout(() => searchResults.style.display = 'none', 200); });

// Controls
document.getElementById('btn-zoom-in').addEventListener('click', () => {
  const c = renderer.getCamera(); c.animate({ ratio: c.getState().ratio / 1.5 }, { duration: 200 });
});
document.getElementById('btn-zoom-out').addEventListener('click', () => {
  const c = renderer.getCamera(); c.animate({ ratio: c.getState().ratio * 1.5 }, { duration: 200 });
});
document.getElementById('btn-fit').addEventListener('click', () => {
  const c = renderer.getCamera(); c.animate({ x: 0.5, y: 0.5, ratio: 1 }, { duration: 400 });
});
document.getElementById('btn-fullscreen').addEventListener('click', () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
});

})();
</script>
</body>
</html>
